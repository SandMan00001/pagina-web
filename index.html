  <!-- Prevenzione traduzione icone per Google Translate -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const protectIcons = () => {
        document.querySelectorAll('.material-symbols-outlined, .material-icons').forEach(el => {
          if (!el.classList.contains('notranslate')) {
            el.classList.add('notranslate');
          }
          if (el.getAttribute('translate') !== 'no') {
            el.setAttribute('translate', 'no');
          }
        });
      };
      protectIcons();
      const observer = new MutationObserver(protectIcons);
      observer.observe(document.documentElement, {
        childList: true,
        subtree: true
      });
    });
  </script>
